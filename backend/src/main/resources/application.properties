# Application Configuration
spring.application.name=taskflow

# Database configuration (Neon / local PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskflow}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configurations (Using a default 256-bit key for local development)
taskflow.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# 86400000 ms = 24 Hours
taskflow.jwt.expiration=86400000

# Gemini AI API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Hugging Face Configuration
hf.api.key=${HF_API_KEY:}
hf.api.url=${HF_API_URL:https://router.huggingface.co/v1/chat/completions}
hf.model=${HF_MODEL:meta-llama/Llama-3.3-70B-Instruct}

# Server configuration
server.port=8080
